<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="720" height="180">
  <defs>
    <!-- Subtle shelf shadow -->
    <filter id="shelf-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!--  ICON — dark rounded square            -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Icon background -->
  <rect x="5" y="5" width="80" height="80" rx="18" fill="#0D1117" stroke="#30363D" stroke-width="1.2"/>

  <!-- Shelf walls (left bracket | ) -->
  <rect x="18" y="16" width="3" height="57" rx="1.5" fill="#3D444D"/>
  <!-- Shelf walls (right bracket | ) -->
  <rect x="69" y="16" width="3" height="57" rx="1.5" fill="#3D444D"/>

  <!-- ── TOP SHELF ── -->
  <rect x="18" y="37" width="54" height="3" rx="1.5" fill="#3D444D" filter="url(#shelf-shadow)"/>
  <!-- Books on top shelf: 2 changelists -->
  <!-- Changelist A (teal) -->
  <rect x="22" y="19" width="7" height="17" rx="1" fill="#2EA043"/>
  <rect x="31" y="22" width="7" height="14" rx="1" fill="#3FB950"/>
  <!-- gap -->
  <!-- Changelist B (amber) -->
  <rect x="43" y="20" width="7" height="16" rx="1" fill="#BB8009"/>
  <rect x="52" y="23" width="7" height="13" rx="1" fill="#E3B341"/>
  <rect x="61" y="19" width="7" height="17" rx="1" fill="#D4A017"/>

  <!-- ── MIDDLE SHELF ── -->
  <rect x="18" y="57" width="54" height="3" rx="1.5" fill="#3D444D" filter="url(#shelf-shadow)"/>
  <!-- Books on middle shelf: 1 changelist + dirty indicator -->
  <rect x="22" y="41" width="7" height="15" rx="1" fill="#1F6FEB"/>
  <rect x="31" y="43" width="7" height="13" rx="1" fill="#388BFD"/>
  <rect x="40" y="40" width="7" height="16" rx="1" fill="#1158C7"/>
  <!-- asterisk/dirty dot on one book -->
  <circle cx="51.5" cy="43" r="2.5" fill="#F0883E"/>
  <rect x="50" y="45" width="3" height="11" rx="1" fill="#F0883E" opacity="0.7"/>
  <!-- gap, then another file -->
  <rect x="60" y="42" width="7" height="14" rx="1" fill="#BC8CFF" opacity="0.9"/>

  <!-- ── BOTTOM SHELF (shelved/stashed items) ── -->
  <!-- Shelf base -->
  <rect x="18" y="73" width="54" height="3" rx="1.5" fill="#3D444D" filter="url(#shelf-shadow)"/>
  <!-- Shelved items — outlined style (hollow = "saved for later") -->
  <rect x="22" y="60" width="7" height="12" rx="1" fill="none" stroke="#2EA043" stroke-width="1.2"/>
  <rect x="31" y="61" width="7" height="11" rx="1" fill="none" stroke="#2EA043" stroke-width="1.2" opacity="0.7"/>
  <!-- gap -->
  <rect x="43" y="60" width="7" height="12" rx="1" fill="none" stroke="#388BFD" stroke-width="1.2"/>
  <rect x="52" y="61" width="7" height="11" rx="1" fill="none" stroke="#388BFD" stroke-width="1.2" opacity="0.7"/>
  <rect x="61" y="62" width="7" height="10" rx="1" fill="none" stroke="#BC8CFF" stroke-width="1.2" opacity="0.8"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  WORDMARK                              -->
  <!-- ═══════════════════════════════════════ -->

  <!-- "git" muted -->
  <text
    x="101"
    y="53"
    font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
    font-size="30"
    font-weight="600"
    letter-spacing="-0.5"
    fill="#8B949E"
  >git</text>

  <!-- "shelf" green -->
  <text
    x="176"
    y="53"
    font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
    font-size="30"
    font-weight="600"
    letter-spacing="-0.5"
    fill="#3FB950"
  >shelf</text>

  <!-- Tagline -->
  <text
    x="101"
    y="70"
    font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
    font-size="11"
    fill="#484F58"
    letter-spacing="0.2"
  >changelists &amp; shelves for any repo</text>
</svg>
