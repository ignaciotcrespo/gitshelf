<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 88" width="800" height="176">
  <defs>
    <style>.mono{font-family:'JetBrains Mono','Fira Code','Cascadia Code','SF Mono','Courier New',monospace}</style>
  </defs>
  <!-- Icon mark -->
  <rect width="88" height="88" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <rect x="15" y="13" width="5" height="62" rx="2" fill="#2d333b"/>
  <rect x="68" y="13" width="5" height="62" rx="2" fill="#2d333b"/>
