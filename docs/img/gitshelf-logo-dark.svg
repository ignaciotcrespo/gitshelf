  <rect x="44" y="19" width="4" height="10" rx="1" fill="#d4a017"/>
  <rect x="51" y="15" width="5" height="14" rx="1" fill="#1158c7"/>
  <rect x="58" y="17" width="5" height="12" rx="1" fill="#388bfd"/>
